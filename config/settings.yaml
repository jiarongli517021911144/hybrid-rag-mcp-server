# Modular RAG MCP Server - Public Example Configuration
# Fill in API keys locally before running, or prefer environment variables.

llm:
  provider: "openai"  # Options: openai, azure, ollama, deepseek
  model: "Qwen/Qwen2.5-7B-Instruct"
  base_url: "https://api.siliconflow.cn/v1"
  api_key: ""
  temperature: 0.0
  max_tokens: 4096

embedding:
  provider: "openai"  # Options: openai, azure, ollama
  model: "BAAI/bge-large-zh-v1.5"
  dimensions: 1024
  base_url: "https://api.siliconflow.cn/v1"
  api_key: ""

vision_llm:
  enabled: false
  provider: "openai"  # Options: openai, azure, ollama
  model: "Qwen/Qwen2-VL-7B-Instruct"
  base_url: "https://api.siliconflow.cn/v1"
  api_key: ""
  max_image_size: 2048

vector_store:
  provider: "chroma"  # Options: chroma, qdrant, pinecone
  persist_directory: "./data/db/chroma"
  collection_name: "knowledge_hub"

retrieval:
  dense_top_k: 20
  sparse_top_k: 20
  fusion_top_k: 10
  rrf_k: 60

rerank:
  enabled: false
  provider: "none"  # Options: none, cross_encoder, llm
  model: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  top_k: 5

evaluation:
  enabled: false
  provider: "custom"  # Options: ragas, deepeval, custom
  metrics:
    - "hit_rate"
    - "mrr"
    - "faithfulness"

observability:
  log_level: "INFO"
  trace_enabled: true
  trace_file: "./logs/traces.jsonl"
  structured_logging: true

ingestion:
  chunk_size: 1000
  chunk_overlap: 200
  splitter: "recursive"  # Options: recursive, semantic, fixed_length
  batch_size: 100
  chunk_refiner:
    use_llm: false
  metadata_enricher:
    use_llm: false
